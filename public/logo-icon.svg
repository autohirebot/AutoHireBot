<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="iconG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e7490"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="crossG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdfa"/>
      <stop offset="100%" style="stop-color:#ccfbf1"/>
    </linearGradient>
    <filter id="iconShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0891b2" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Main icon square -->
  <rect x="10" y="10" width="80" height="80" rx="20" fill="url(#iconG)" filter="url(#iconShadow)"/>

  <!-- Medical cross -->
  <rect x="34" y="40" width="32" height="10" rx="3" fill="url(#crossG)"/>
  <rect x="45" y="28" width="10" height="34" rx="3" fill="url(#crossG)"/>

  <!-- AI circuit dots -->
  <circle cx="22" cy="45" r="4" fill="#99f6e4" opacity="0.9"/>
  <circle cx="78" cy="45" r="4" fill="#99f6e4" opacity="0.9"/>
  <circle cx="50" cy="18" r="3.5" fill="#99f6e4" opacity="0.7"/>
  <circle cx="50" cy="72" r="3.5" fill="#99f6e4" opacity="0.7"/>

  <!-- Connection lines -->
  <line x1="26" y1="45" x2="34" y2="45" stroke="#99f6e4" stroke-width="1.5" opacity="0.5"/>
  <line x1="66" y1="45" x2="74" y2="45" stroke="#99f6e4" stroke-width="1.5" opacity="0.5"/>
  <line x1="50" y1="21.5" x2="50" y2="28" stroke="#99f6e4" stroke-width="1.5" opacity="0.5"/>
  <line x1="50" y1="62" x2="50" y2="68.5" stroke="#99f6e4" stroke-width="1.5" opacity="0.5"/>

  <!-- Corner circuit dots -->
  <circle cx="24" cy="24" r="2.5" fill="#67e8f9" opacity="0.5"/>
  <circle cx="76" cy="24" r="2.5" fill="#67e8f9" opacity="0.5"/>
  <circle cx="24" cy="66" r="2.5" fill="#67e8f9" opacity="0.5"/>
  <circle cx="76" cy="66" r="2.5" fill="#67e8f9" opacity="0.5"/>
</svg>
