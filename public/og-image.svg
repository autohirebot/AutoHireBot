      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>
  <rect x="80" y="180" width="80" height="80" rx="18" fill="url(#accent)"/>
  <text x="120" y="215" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-weight="800" font-size="28">A</text>
  <text x="120" y="245" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-weight="800" font-size="18">HB</text>
