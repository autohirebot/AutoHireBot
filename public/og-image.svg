  <text x="80" y="320" fill="#94a3b8" font-family="Arial,sans-serif" font-weight="500" font-size="32">AI-Powered Healthcare Recruitment</text>
  <text x="80" y="370" fill="#64748b" font-family="Arial,sans-serif" font-weight="400" font-size="26">Connecting Nurses with Hospitals across India</text>
