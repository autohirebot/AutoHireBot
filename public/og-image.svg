  <text x="80" y="550" fill="#475569" font-family="Arial,sans-serif" font-weight="400" font-size="20">autohirebot.com | FREE for Job Seekers | AI Matching in 2 Minutes</text>
  <!-- Decorative elements -->
  <circle cx="1050" cy="200" r="120" fill="#0891b2" opacity="0.08"/>
  <circle cx="1100" cy="350" r="80" fill="#06b6d4" opacity="0.06"/>
