<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <defs>
    <linearGradient id="logoGradL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="50%" style="stop-color:#0e7490"/>
      <stop offset="100%" style="stop-color:#155e75"/>
    </linearGradient>
    <linearGradient id="iconGradL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e7490"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <filter id="shadowL" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0e7490" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Icon -->
  <rect x="8" y="14" width="72" height="72" rx="18" fill="url(#iconGradL)" filter="url(#shadowL)"/>

  <!-- Medical cross -->
  <rect x="30" y="32" width="28" height="8" rx="2" fill="#fff"/>
  <rect x="40" y="22" width="8" height="28" rx="2" fill="#fff"/>

  <!-- AI circuit dots -->
  <circle cx="24" cy="36" r="3" fill="#a5f3fc" opacity="0.9"/>
  <circle cx="64" cy="36" r="3" fill="#a5f3fc" opacity="0.9"/>
  <circle cx="44" cy="16" r="2.5" fill="#a5f3fc" opacity="0.7"/>
  <circle cx="44" cy="56" r="2.5" fill="#a5f3fc" opacity="0.7"/>

  <!-- Connection lines -->
  <line x1="27" y1="36" x2="30" y2="36" stroke="#a5f3fc" stroke-width="1.2" opacity="0.6"/>
  <line x1="58" y1="36" x2="61" y2="36" stroke="#a5f3fc" stroke-width="1.2" opacity="0.6"/>
  <line x1="44" y1="18.5" x2="44" y2="22" stroke="#a5f3fc" stroke-width="1.2" opacity="0.6"/>
  <line x1="44" y1="50" x2="44" y2="53.5" stroke="#a5f3fc" stroke-width="1.2" opacity="0.6"/>

  <!-- Person silhouette -->
  <circle cx="62" cy="60" r="4" fill="#e0f2fe" opacity="0.8"/>
  <path d="M56 72 Q62 66 68 72" stroke="#e0f2fe" stroke-width="2" fill="none" opacity="0.8"/>

  <!-- Brand Name - Light background version (dark text) -->
  <text x="96" y="45" font-family="'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif" font-weight="800" font-size="32" fill="#0f172a">
    Auto<tspan fill="url(#logoGradL)">Hire</tspan>Bot
  </text>

  <!-- Tagline -->
  <text x="96" y="68" font-family="'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif" font-weight="500" font-size="12.5" fill="#64748b" letter-spacing="2.5">
    AI-POWERED HEALTHCARE RECRUITMENT
  </text>

  <rect x="96" y="74" width="60" height="2" rx="1" fill="url(#logoGradL)" opacity="0.6"/>
</svg>
